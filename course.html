<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript Guide — Data Types</title>
    <meta
      name="description"
      content="A structured JavaScript learning platform covering data types and core language concepts."
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <link rel="stylesheet" href="style.css?v=5" />
    <link rel="stylesheet" href="styleContent.css?v=5" />
    <!-- Load Fuse.js for Search functionality -->
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.min.js"></script>
    <script type="module" src="js/app.js"></script>
    <!-- Prism syntax highlighting (VS Code Tomorrow Dark theme) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"
    />
  </head>

  <body>
    <button
      type="button"
      class="sidebar-toggle"
      id="sidebarToggle"
      aria-label="Toggle menu"
      aria-expanded="false"
    >
      <!-- <i class="fa-solid fa-bars"></i> -->
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="lucide lucide-panel-left"
      >
        <rect width="18" height="18" x="3" y="3" rx="2"></rect>
        <path d="M9 3v18"></path>
      </svg>
    </button>
    <div class="sidebar-backdrop" id="sidebarBackdrop" aria-hidden="true"></div>

    <div class="app">
      <!-- ===== SIDEBAR ===== -->
      <aside
        class="sidebar"
        id="sidebar"
        role="complementary"
        aria-label="Course navigation"
      >
        <div class="sidebar-header">
          <a href="index.html" class="sidebar-brand" style="margin-bottom: 0.5rem; text-decoration: none;" title="Back to Domains">
            <span class="brand-icon" style="font-size: 1.2rem;"><i class="fa-solid fa-house"></i></span>
            <span class="brand-name" style="font-size: 1.1rem;">ThinkBase Home</span>
          </a>
          <div style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid var(--border-light);">
            <span class="brand-icon" id="courseIcon" style="font-size: 1rem; background: var(--bg-panel, rgba(255,255,255,0.1)); padding: 4px 6px; border-radius: 4px; font-weight: bold;">JS</span>
            <span class="brand-name" id="courseTitle" style="font-size: 1rem; color: var(--text-muted, #94a3b8);">JavaScript Guide</span>
          </div>
        </div>

        <div class="sidebar-search-wrap">
          <i
            class="fa-solid fa-search sidebar-search-icon"
            aria-hidden="true"
          ></i>
          <input
            type="search"
            class="sidebar-search"
            id="lessonSearch"
            placeholder="Search lessons…"
            aria-label="Search lessons"
            autocomplete="off"
          />
        </div>

        <div class="sidebar-scroll-area">
          <!-- Sidebar Tabs -->
          <div class="sidebar-tabs" id="sidebarTabs" role="tablist">
            <button class="sidebar-tab active" id="tabSections" data-tab="sections" role="tab" aria-selected="true">Sections</button>
            <button class="sidebar-tab" id="tabBookmarks" data-tab="bookmarks" role="tab" aria-selected="false">Bookmarks</button>
          </div>

          <div id="viewSections">
            <div
              class="sidebar-section-switcher"
              id="sectionSwitcher"
              role="tablist"
              aria-label="Sections"
            >
              <!-- Dynamically populated by app.js -->
            </div>

            <div class="sidebar-section-info" id="sidebarSectionInfo">
              <span class="section-badge" id="sectionBadge">Chapter 5</span>
              <h2 class="section-heading" id="sectionHeading">Data Types</h2>
              <p class="section-subtext" id="sectionSubtext">
                Core data structures in JavaScript
              </p>
            </div>
          </div>

          <div id="viewBookmarks" hidden>
             <!-- Populated dynamically -->
          </div>

          <nav class="sidebar-nav" id="lessonNav" aria-label="Lesson list">
            <!-- Dynamically populated by app.js -->
          </nav>
        </div>

        <div class="sidebar-footer">
          <div class="progress-wrap">
            <div class="progress-label">
              <span>Progress</span>
              <span id="progressPercent">0%</span>
            </div>
            <div class="progress-track">
              <div
                class="progress-fill"
                id="progressFill"
                style="width: 0%"
              ></div>
            </div>
          </div>
        </div>
      </aside>

      <!-- ===== MAIN CONTENT ===== -->
      <main class="main" id="mainContent">
        <div class="content-wrap" id="contentWrap">
          <div class="content-main" id="contentMain">
            <nav class="lesson-breadcrumbs" id="lessonBreadcrumbs" aria-label="Breadcrumb"></nav>
            <div
              id="lessonContent"
              role="region"
              aria-live="polite"
              aria-label="Lesson content"
            >
              <!-- Dynamically populated by app.js -->
            </div>
            
            <div id="lessonTags" class="lesson-tags" aria-label="Lesson tags"></div>
            
            <section id="relatedLessons" class="related-lessons" aria-labelledby="relatedLessonsTitle" style="display: none;">
              <h3 id="relatedLessonsTitle">Related Lessons</h3>
              <div class="related-lessons-grid" id="relatedLessonsGrid"></div>
            </section>
            <footer
              class="lesson-nav-footer"
              id="lessonNavFooter"
              aria-label="Lesson navigation"
            >
              <!-- Prev/next buttons populated by app.js -->
            </footer>
          </div>
          <aside
            id="lessonToc"
            class="lesson-toc"
            aria-label="On this page"
          ></aside>
        </div>
      </main>
    </div>
    <div class="outer">
      <div class="inner"><i class="fa-solid fa-angles-up"></i></div>
    </div>
    <!-- Prism core + JavaScript language component -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  </body>
</html>
