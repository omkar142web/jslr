<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ThinkBase - Select Your Interest</title>
    <meta name="description" content="ThinkBase: A multi-domain knowledge platform. Select your interest to begin learning." />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <link rel="stylesheet" href="selection.css" />
  </head>
  <body>
    <div class="background-effects">
      <div class="glow glow-1"></div>
      <div class="glow glow-2"></div>
    </div>

    <main class="selection-container">
      <header class="header">
        <div class="brand">
          <i class="fa-solid fa-brain brand-icon"></i>
          <h1>ThinkBase</h1>
        </div>
        <p class="subtitle" id="pageSubtitle">Select what you want to learn</p>
      </header>

      <!-- View 1: Domains -->
      <section class="grid-view active" id="domainView">
        <div class="grid" id="domainGrid">
          <!-- Dynamically populated by selection.js -->
        </div>
      </section>

      <!-- View 2: Subjects -->
      <section class="grid-view" id="subjectView">
        <button class="back-btn" id="backBtn">
          <i class="fa-solid fa-arrow-left"></i> Back to Domains
        </button>
        <div class="domain-header" id="selectedDomainHeader">
          <!-- Populated by JS -->
        </div>
        <div class="grid" id="subjectGrid">
          <!-- Dynamically populated by selection.js -->
        </div>
      </section>
    </main>

    <script type="module" src="js/selection.js"></script>
  </body>
</html>
